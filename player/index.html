<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Spice Route Food Court — Full-Stack Microservices Course</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1A1714; --paper:#FBF7F0; --stall:#C4531F; --steam:#2E6E63;
  --rail:#E8DFD2; --night:#241E38;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--paper);color:var(--ink);
  font:16px/1.65 system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
h1,h2,h3{font-family:"Fraunces",serif;font-optical-sizing:auto;line-height:1.2;margin:0 0 .5em}
code,pre,.mono{font-family:"JetBrains Mono",monospace}
pre{background:var(--night);color:#EFE9DC;padding:16px;border-radius:8px;
  overflow-x:auto;font-size:13.5px;line-height:1.55}
code{background:var(--rail);padding:1px 5px;border-radius:4px;font-size:.88em}
pre code{background:none;padding:0}

/* Layout */
.app{display:grid;grid-template-columns:250px 1fr;min-height:100vh}
nav{border-right:1.5px solid var(--rail);padding:20px 14px;position:sticky;top:0;
  height:100vh;overflow-y:auto;background:var(--paper)}
nav .brand{font-family:"Fraunces",serif;font-weight:700;font-size:18px;margin-bottom:16px}
nav .track{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.08em;
  text-transform:uppercase;color:var(--stall);margin:14px 0 4px}
nav a{display:block;padding:5px 8px;border-radius:6px;color:var(--ink);
  text-decoration:none;font-size:13.5px}
nav a:hover{background:var(--rail)}
nav a.active{background:var(--ink);color:var(--paper)}
main{padding:32px 24px 96px;max-width:760px;margin:0 auto;width:100%}
#menuBtn{display:none}

/* Signature: order-ticket module header */
.ticket{background:#fff;border:1.5px solid var(--ink);border-radius:0 0 10px 10px;
  padding:18px 22px 16px;margin-bottom:28px;position:relative;
  box-shadow:4px 4px 0 var(--rail)}
.ticket::before{content:"";position:absolute;top:-1px;left:0;right:0;height:10px;
  background:radial-gradient(circle at 10px 0,transparent 6px,#fff 6.5px) repeat-x;
  background-size:20px 10px;
  border-top:0}
.ticket .row{display:flex;justify-content:space-between;align-items:baseline;
  font-family:"JetBrains Mono",monospace;font-size:12px;letter-spacing:.06em;
  text-transform:uppercase;color:var(--stall)}
.ticket h1{font-size:30px;margin:.25em 0 .1em}
.ticket .meta{font-size:13px;color:#6b625a}
.ticket .concepts span{display:inline-block;background:var(--rail);border-radius:99px;
  padding:2px 10px;font-size:12px;margin:6px 6px 0 0;font-family:"JetBrains Mono",monospace}

/* Sections */
section{margin:34px 0}
.eyebrow{font-family:"JetBrains Mono",monospace;font-size:11.5px;letter-spacing:.1em;
  text-transform:uppercase;color:var(--steam);margin-bottom:8px}
.analogy{border-left:3px solid var(--stall);padding:4px 0 4px 18px}
.analogy p{margin:.6em 0}
table{border-collapse:collapse;width:100%;font-size:14.5px;margin:12px 0}
th,td{border:1px solid var(--rail);padding:8px 12px;text-align:left}
th{background:var(--rail);font-family:"JetBrains Mono",monospace;font-size:12px;
  text-transform:uppercase;letter-spacing:.06em}
.diagram{background:#fff;border:1.5px solid var(--rail);border-radius:10px;padding:20px}
.diagram figcaption{font-size:13.5px;color:#6b625a;margin-top:12px}
.diagram figcaption b{color:var(--steam)}

/* Labs */
.lab{background:#fff;border:1.5px solid var(--ink);border-radius:10px;overflow:hidden}
.lab .tabs{display:flex;border-bottom:1.5px solid var(--ink)}
.lab .tabs button{flex:1;padding:12px;border:0;background:var(--rail);cursor:pointer;
  font:600 13px "JetBrains Mono",monospace;text-transform:uppercase;letter-spacing:.05em}
.lab .tabs button.on{background:#fff}
.lab .pane{display:none;padding:20px}
.lab .pane.on{display:block}
.check{display:flex;gap:10px;align-items:flex-start;margin:8px 0;font-size:14.5px}
.check::before{content:"☐";color:var(--steam);font-size:18px;line-height:1.3}

/* Quiz */
.quiz .q{background:#fff;border:1.5px solid var(--rail);border-radius:10px;
  padding:16px 18px;margin:12px 0}
.quiz .opt{display:block;width:100%;text-align:left;margin:6px 0;padding:9px 12px;
  border:1.5px solid var(--rail);border-radius:8px;background:var(--paper);
  cursor:pointer;font:14.5px system-ui}
.quiz .opt.right{border-color:var(--steam);background:#E8F2EF}
.quiz .opt.wrong{border-color:var(--stall);background:#F9E9E1}
.quiz .why{display:none;font-size:13.5px;color:var(--steam);margin-top:8px}
.quiz .q.done .why{display:block}

.recap{background:var(--night);color:#EFE9DC;border-radius:10px;padding:16px 20px;
  font-family:"Fraunces",serif;font-size:17px}
.recap b{color:#F0A97D}
.next{font-size:14px;color:#6b625a;font-style:italic}
.navBtns{display:flex;justify-content:space-between;margin-top:44px}
.navBtns button{padding:10px 18px;border:1.5px solid var(--ink);border-radius:8px;
  background:#fff;cursor:pointer;font:600 13px "JetBrains Mono",monospace}
.navBtns button:hover{background:var(--rail)}

@media(max-width:860px){
  .app{grid-template-columns:1fr}
  nav{position:fixed;left:-260px;width:250px;transition:left .25s;z-index:20;
    border-right:1.5px solid var(--ink)}
  nav.open{left:0}
  #menuBtn{display:block;position:fixed;top:12px;right:12px;z-index:21;
    padding:8px 14px;border:1.5px solid var(--ink);border-radius:8px;background:#fff;
    font:600 12px "JetBrains Mono",monospace;cursor:pointer}
  main{padding:56px 18px 80px}
}
@media(prefers-reduced-motion:reduce){html{scroll-behavior:auto}nav{transition:none}}
</style>
</head>

  <section class="analogy">
    <div class="eyebrow">The Food Court · Beat 1</div>
    <p>Anu steps into <b>The Spice Route</b> food court on a Friday evening. Years ago this was one giant restaurant — one kitchen, one menu, one queue. When the tandoor broke, <i>everything</i> stopped.</p>
    <p>Today it's different. Farid, the floor manager, walks her past independent stalls: a Biryani Counter, a Dosa Counter, a Juice Counter. Behind them, separate kitchens with their own stoves and pantries. A steward named Meenakshi moves between them holding a laminated checklist, and above the pass, order tickets slide along a steel rail.</p>
    <p>"One stall can close, renovate, or catch fire," Farid says, "and the food court keeps serving."</p>
  </section>

    <h2>One giant restaurant vs. a food court</h2>
    <p>The old single restaurant is a <b>monolith</b>: one codebase, one deployment, one point of failure. The food court is the modern architecture you'll build in this course:</p>

      <tr><td>Stall counters Anu sees</td><td><b>Angular</b> microfrontends (UI pieces)</td></tr>

      <tr><td>Independent kitchens & pantries</td><td><b>Spring Boot</b> microservices, each with its own database</td></tr>
      <tr><td>Meenakshi's laminated checklist</td><td><b>Camunda</b> — a drawn, executable workflow (BPMN)</td></tr>

  <section class="analogy">

    `<div class="navBtns">
      <button ${i===0?'disabled':''} onclick="show('${MODS[i-1]?.id}')">← Prev</button>
      <button ${i===MODS.length-1?'disabled':''} onclick="show('${MODS[i+1]?.id}')">Next →</button>
    </div>`;
  renderNav(id); wireLabs(); wireQuiz(m);
  window.scrollTo(0,0); document.getElementById('nav').classList.remove('open');
  location.hash=id;
}
function wireLabs(){
  document.querySelectorAll('.lab').forEach(lab=>{
    lab.querySelectorAll('.tabs button').forEach(btn=>{
      btn.onclick=()=>{
        lab.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('on'));
        lab.querySelectorAll('.pane').forEach(p=>p.classList.remove('on'));
        btn.classList.add('on');
        lab.querySelector(`.pane[data-pane="${btn.dataset.pane}"]`).classList.add('on');
      };
    });
  });
}
function wireQuiz(m){
  const host=document.querySelector('.quiz'); if(!host||!m.quiz)return;
  m.quiz.forEach((q,qi)=>{
    const d=document.createElement('div'); d.className='q';
    d.innerHTML=`<p><b>Q${qi+1}.</b> ${q.q}</p>`+
      q.options.map((o,oi)=>`<button class="opt" data-oi="${oi}">${o}</button>`).join('')+
      `<div class="why">✔ ${q.why}</div>`;
    d.querySelectorAll('.opt').forEach(b=>b.onclick=()=>{
      if(d.classList.contains('done'))return;
      d.classList.add('done');
      b.classList.add(+b.dataset.oi===q.answer?'right':'wrong');
      d.querySelectorAll('.opt')[q.answer].classList.add('right');
    });
    host.appendChild(d);
  });
}
document.getElementById('menuBtn').onclick=()=>document.getElementById('nav').classList.toggle('open');
window.addEventListener('hashchange',()=>{
  const id=location.hash.slice(1);
  if(id&&id!==currentId)show(id);   // back/forward & manual #mXX edits
});
show(location.hash?location.hash.slice(1):MODS[0].id);
</script>
</body>
